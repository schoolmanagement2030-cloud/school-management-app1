<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SchoolSphere - Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root { --gold:#ffd700; --error:#ff4d4d; --glass: rgba(255,255,255,0.1); }

body {
    margin:0; font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white; text-align:center; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
}

.app-name { font-size:40px; font-weight:800; color:var(--gold); margin-bottom:5px; }
.tagline { font-size:14px; margin-bottom:30px; color:#ccc; }

.input-group {
    width:100%; display:flex; flex-direction:column;
    align-items:center; gap:15px; margin-bottom:25px;
}

input {
    padding:15px; border-radius:30px; border:2px solid var(--gold);
    width:80%; max-width:300px; text-align:center;
    background: var(--glass); color:white; outline:none;
}

#error-msg {
    color:var(--error);
    margin-bottom:15px;
    font-weight:bold;
    min-height:20px;
}

#loader {
    display:none;
    margin-bottom:15px;
    color:var(--gold);
}

.role-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:12px; width:90%; max-width:400px;
}

.role {
    padding:15px; border-radius:15px;
    cursor:pointer; font-weight:bold; border:none; color:white;
    transition:0.3s;
}

.role:active { transform: scale(0.95); }

.owner { background:#6a11cb; grid-column:span 2; }
.principal { background:#2575fc; }
.accountant { background:#f2994a; }
.teacher { background:#11998e; }
.driver { background:#f093fb; }
.parent { background:#373b44; grid-column:span 2; }
</style>
</head>

<body>

<h1 class="app-name">SchoolSphere</h1>
<p class="tagline">Empowering Education Digitally</p>

<div class="input-group">
    <input type="text" id="school-id" placeholder="स्कूल आईडी (e.g. RJ01)">
    <input type="email" id="email" placeholder="ईमेल">
    <input type="password" id="password" placeholder="पासवर्ड">
</div>

<div id="error-msg"></div>
<div id="loader">⏳ कृपया प्रतीक्षा करें...</div>

<div class="role-grid">
    <button class="role owner" onclick="login('owner')">Owner</button>
    <button class="role principal" onclick="login('principal')">Principal</button>
    <button class="role accountant" onclick="login('accountant')">Accountant</button>
    <button class="role teacher" onclick="login('teacher')">Teacher</button>
    <button class="role driver" onclick="login('driver')">Driver</button>
    <button class="role parent" onclick="login('parent')">Parent</button>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID"
};

// ✅ SAFE INIT
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const auth = firebase.auth();

// 🔠 AUTO UPPERCASE
document.getElementById("school-id").addEventListener("input", function(){
    this.value = this.value.toUpperCase();
});

// 🔑 ENTER LOGIN
document.getElementById("password").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        login("owner");
    }
});

// 🌐 NETWORK STATUS
window.addEventListener("offline", ()=> showError("📡 इंटरनेट नहीं है"));
window.addEventListener("online", ()=> showError(""));

// ❌ ERROR
function showError(msg){
    document.getElementById("error-msg").innerText = msg;
}

// ⏳ LOADER
function showLoader(v){
    document.getElementById("loader").style.display = v ? "block" : "none";
}

// 🔐 LOGIN
async function login(role){

    if(!navigator.onLine) return showError("📡 इंटरनेट नहीं है");

    const school = document.getElementById("school-id").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if(!school || !email || !password){
        return showError("⚠️ सभी जानकारी भरें");
    }

    showLoader(true);
    showError("");

    try {
        const userCred = await auth.signInWithEmailAndPassword(email, password);
        const uid = userCred.user.uid;

        // 🔍 ROLE CHECK
        const snap = await db.ref(`schools/${school}/users/${uid}/role`).once("value");
        const dbRole = snap.val();

        if(!dbRole || dbRole !== role){
            await auth.signOut();
            showLoader(false);
            return showError("❌ इस रोल के लिए अनुमति नहीं है");
        }

        // 💾 SAVE SESSION
        localStorage.setItem("activeSchool", school);
        localStorage.setItem("userRole", role);
        localStorage.setItem("uid", uid);

        window.location.href = role + "_dashboard.html";

    } catch(e) {
        console.error(e);

        if(e.code === "auth/user-not-found"){
            showError("❌ यूज़र नहीं मिला");
        } else if(e.code === "auth/wrong-password"){
            showError("❌ गलत पासवर्ड");
        } else if(e.code === "auth/invalid-email"){
            showError("❌ गलत ईमेल");
        } else {
            showError("❌ लॉगिन फेल");
        }
    }

    showLoader(false);
}

// 🔒 SESSION CHECK
auth.onAuthStateChanged(user => {
    if(!user){
        localStorage.clear();
    }
});

// 🔁 AUTO LOGIN
window.onload = function(){
    const school = localStorage.getItem("activeSchool");
    const role = localStorage.getItem("userRole");

    if(school && role){
        window.location.href = role + "_dashboard.html";
    }
};

</script>

</body>
</html>
