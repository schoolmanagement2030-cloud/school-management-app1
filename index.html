<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SchoolSphere - Login</title>

<style>
:root { 
    --gold: #FFD54F; 
    --bg-dark: #1A2E35;
}

body {
    margin:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027);
    color:white; text-align:center; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow: hidden;
}

.app-name { 
    font-size: 52px; 
    font-weight: 900; 
    color: var(--gold); 
    margin-bottom: 2px; 
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

.tagline { 
    font-size: 14px; 
    margin-bottom: 50px; 
    color: #BDC3C7; 
    text-transform: uppercase; 
    letter-spacing: 2.5px; 
    font-weight: 500;
}

/* Role Grid Layout */
.role-grid {
    display: grid; 
    grid-template-columns: 1fr 1fr;
    gap: 15px; 
    width: 90%; 
    max-width: 420px;
}

.role {
    padding: 25px 10px; 
    border-radius: 20px;
    cursor: pointer; 
    font-weight: bold; 
    border: none; 
    color: white;
    font-size: 18px;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

.role:active { transform: scale(0.92); opacity: 0.9; }

/* Gradients exactly like your screenshot */
.owner { 
    background: linear-gradient(135deg, #8E24AA, #651FFF); 
    grid-column: span 2; 
}
.principal { background: linear-gradient(135deg, #2196F3, #00BCD4); }
.accountant { background: linear-gradient(135deg, #FFA000, #FFCC80); }
.teacher { background: linear-gradient(135deg, #00C853, #69F0AE); }
.driver { background: linear-gradient(135deg, #E91E63, #FF80AB); }
.parent { 
    background: linear-gradient(135deg, #EF5350, #FFAB91); 
    grid-column: span 2; 
}

/* Icons using Emoji for simplicity (Same as screenshot) */
.icon { font-size: 32px; margin-bottom: 5px; }

</style>
</head>

<body>

    <h1 class="app-name">SchoolSphere</h1>
    <p class="tagline">THE DIGITAL SCHOOL HUB</p>

    <div class="role-grid">
        <button class="role owner" onclick="selectRole('owner')">
            <span class="icon">👑</span>
            Owner
        </button>
        
        <button class="role principal" onclick="selectRole('principal')">
            <span class="icon">🏢</span>
            Principal
        </button>
        
        <button class="role accountant" onclick="selectRole('accountant')">
            <span class="icon">💰</span>
            Accountant
        </button>
        
        <button class="role teacher" onclick="selectRole('teacher')">
            <span class="icon">👨‍🏫</span>
            Teacher
        </button>
        
        <button class="role driver" onclick="selectRole('driver')">
            <span class="icon">🚌</span>
            Driver
        </button>
        
        <button class="role parent" onclick="selectRole('parent')">
            <span class="icon">🎓</span>
            Parent / Student
        </button>
    </div>

<script>
    function selectRole(role) {
        console.log("Selected Role: " + role);
        // यहाँ क्लिक करने पर जो भी एक्शन लेना हो वो लिखें
        // जैसे: window.location.href = role + "_login.html";
    }
</script>

</body>
</html>
