<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SchoolSphere - Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root { 
    --gold: #FFD54F; 
}

body {
    margin:0; font-family:'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027);
    color:white; text-align:center; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
}

/* Logo Styling */
.logo {
    width: 100px;
    height: auto;
    margin-bottom: 10px;
}

.app-name { 
    font-size: 48px; 
    font-weight: 900; 
    color: var(--gold); 
    margin-bottom: 2px; 
}

.tagline { 
    font-size: 14px; 
    margin-bottom: 40px; 
    color: #BDC3C7; 
    text-transform: uppercase; 
    letter-spacing: 2px; 
}

/* Buttons Grid */
.role-grid {
    display: grid; 
    grid-template-columns: 1fr 1fr;
    gap: 15px; 
    width: 90%; 
    max-width: 420px;
}

.role {
    padding: 25px 10px; 
    border-radius: 20px;
    cursor: pointer; 
    font-weight: bold; 
    border: none; 
    color: white;
    font-size: 18px;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.4);
}

.role:active { transform: scale(0.92); }

/* Gradients from your image */
.owner { background: linear-gradient(135deg, #8E24AA, #651FFF); grid-column: span 2; }
.principal { background: linear-gradient(135deg, #2196F3, #00BCD4); }
.accountant { background: linear-gradient(135deg, #FFA000, #FFCC80); }
.teacher { background: linear-gradient(135deg, #00C853, #69F0AE); }
.driver { background: linear-gradient(135deg, #E91E63, #FF80AB); }
.parent { background: linear-gradient(135deg, #EF5350, #FFAB91); grid-column: span 2; }

.icon { font-size: 30px; }

/* Status Messages */
#status-msg { margin-top: 15px; color: var(--gold); font-weight: bold; }
</style>
</head>

<body>

    <img src="logo.png" alt="SchoolSphere Logo" class="logo">
    
    <h1 class="app-name">SchoolSphere</h1>
    <p class="tagline">THE DIGITAL SCHOOL HUB</p>

    <div class="role-grid">
        <button class="role owner" onclick="selectRole('owner')">
            <span class="icon">👑</span> Owner
        </button>
        
        <button class="role principal" onclick="selectRole('principal')">
            <span class="icon">🏢</span> Principal
        </button>
        
        <button class="role accountant" onclick="selectRole('accountant')">
            <span class="icon">💰</span> Accountant
        </button>
        
        <button class="role teacher" onclick="selectRole('teacher')">
            <span class="icon">👨‍🏫</span> Teacher
        </button>
        
        <button class="role driver" onclick="selectRole('driver')">
            <span class="icon">🚌</span> Driver
        </button>
        
        <button class="role parent" onclick="selectRole('parent')">
            <span class="icon">🎓</span> Parent / Student
        </button>
    </div>

    <div id="status-msg"></div>

<script>
// 🔥 Firebase Configuration (अपनी जानकारी यहाँ डालें)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    databaseURL: "YOUR_DATABASE_URL",
    projectId: "YOUR_PROJECT_ID"
};

// Initialize Firebase
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();
const db = firebase.database();

function selectRole(role) {
    document.getElementById("status-msg").innerText = role.toUpperCase() + " लॉगिन पेज पर जा रहे हैं...";
    
    // यहाँ आप अपनी ज़रूरत के हिसाब से पेज का नाम बदल सकते हैं
    // उदाहरण के लिए: 
    setTimeout(() => {
        window.location.href = role + "_login.html"; 
    }, 1000);
}

// ऑटो लॉगिन चेक (Session)
window.onload = function() {
    const savedRole = localStorage.getItem("userRole");
    if(savedRole) {
        console.log("Auto-login for: " + savedRole);
    }
};
</script>

</body>
</html>
