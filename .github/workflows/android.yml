name: SchoolSphere Auto Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 1. Dependencies यहाँ से उठाएगा (Path check)
      - name: Get Dependencies
        run: flutter pub get
        working-directory: app/src/main 

      # 2. Web बिल्ड आपकी लिंक के साथ
      - name: Build Web
        run: flutter build web --base-href "/school-management-app1/"
        working-directory: app/src/main

      # 3. बिल्ड होने के बाद फाइल यहाँ से उठाएगा
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: app/src/main/build/web 
          branch: gh-pages
