name: SchoolSphere Auto Deploy & APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # प्रोजेक्ट सेटअप
      - name: Create Project Structure
        run: |
          flutter create . --platforms android,web
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' android/app/src/main/AndroidManifest.xml

      - name: Get Dependencies
        run: flutter pub get

      # APK बनाना
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolSphere-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # वेबसाइट बनाना (यह सबसे जरूरी हिस्सा है)
      - name: Build Web
        run: |
          # आपकी index.html को web फोल्डर में जबरदस्ती डालना
          cp index.html web/index.html || true
          cp owner.html web/owner.html || true
          cp Owner.html web/owner.html || true
          # बेस-लिंक को यहाँ सीधे फिक्स करना
          sed -i 's|<base href=".*">|<base href="/school-management-app1/">|g' web/index.html
          flutter build web --base-href "/school-management-app1/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
