name: SchoolSphere Auto Deploy & APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # --- APK बनाने का स्टेप ---
      - name: Build APK
        run: flutter build apk --release

      # --- APK को डाउनलोड के लिए उपलब्ध कराना ---
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolSphere-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- वेब डिप्लॉयमेंट (जो पहले से था) ---
      - name: Configure Web Support
        run: flutter create . --platforms web

      - name: Build Web
        run: flutter build web --base-href "/school-management-app1/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
