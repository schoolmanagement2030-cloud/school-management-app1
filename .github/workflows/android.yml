name: SchoolSphere Auto Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # यहाँ हमने बताया है कि Flutter प्रोजेक्ट 'app/src/main' के अंदर है
      - name: Get Dependencies
        run: flutter pub get
        working-directory: app/src/main 

      - name: Build Web
        run: flutter build web --base-href "/school-management-app1/"
        working-directory: app/src/main

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: app/src/main/build/web # बिल्ड फोल्डर का सही रास्ता
          branch: gh-pages
