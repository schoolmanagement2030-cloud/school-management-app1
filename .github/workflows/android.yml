name: SchoolSphere Auto Deploy & APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # यह स्टेप एंड्रॉइड फोल्डर की कमी को दूर करेगा
      - name: Fix Android Project Structure
        run: flutter create . --platforms android,web

      - name: Get Dependencies
        run: flutter pub get

      # अब APK बनेगा बिना किसी एरर के
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolSphere-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      # वेब डिप्लॉयमेंट (ताकि वेबसाइट भी चलती रहे)
      - name: Build Web
        run: flutter build web --base-href "/school-management-app1/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
