name: SchoolSphere Auto Deploy

on:
  push:
    branches:
      - main  # जब भी आप main branch में Push करेंगे, ये अपने आप चलेगा

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. कोड को GitHub से चेकआउट करना
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java सेटअप करना
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Flutter सेटअप करना
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. डिपेंडेंसीज डाउनलोड करना
      - name: Get Dependencies
        run: flutter pub get

      # 5. Web के लिए बिल्ड करना (आपकी लिंक यहाँ डाली गई है)
      - name: Build Web
        run: flutter build web --base-href "/school-management-app1/"

      # 6. ऑटोमैटिक 'gh-pages' ब्रांच पर डिप्लॉय करना
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
